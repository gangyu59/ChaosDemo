<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizations</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/static/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <header>
        <h1>混沌理论可视化</h1>
        <p>点击按钮探索各种混沌系统与分形</p>
    </header>
    <canvas id="myCanvas" width="900" height="700"></canvas>
    <div class="button-grid">
        <div class="section-label">Fractals</div>
	    <button class="btn-fractal" id="showMandelbrot">🌀 Mandelbrot Set</button>
	    <button class="btn-fractal" id="showJulia">🔮 Julia Set</button>
	    <button class="btn-fractal" id="showSierpinski">🔺 Sierpinski Set</button>
	    <button class="btn-fractal" id="showKoch">❄️ Koch Curve</button>
	    <button class="btn-fractal" id="showCantor">📏 Cantor Set</button>
	    <button class="btn-fractal" id="showBarnsleyFern">🌿 Barnsley Fern</button>

        <div class="section-label">Attractors</div>
	    <button class="btn-attractor" id="showLorenz">🌪 Lorenz Attractor</button>
	    <button class="btn-attractor" id="showRossler">🌊 Rossler Attractor</button>
	    <button class="btn-attractor" id="showDoublePendulum">⚖️ Double Pendulum</button>

        <div class="section-label">Maps</div>
	    <button class="btn-map" id="showHenon">♾ Henon Map</button>
	    <button class="btn-map" id="showLogistic">📈 Logistic Map</button>
	    <button class="btn-map" id="showIkeda">💫 Ikeda Map</button>

        <div class="section-label">Bio Patterns</div>
	    <button class="btn-bio" id="showGameOfLife">🧬 Game of Life</button>
	    <button class="btn-bio" id="showTuring">🧪 Turing Patterns</button>
    </div>
		
     <script type="module" src="/static/js/julia.js"></script>
    <script type="module" src="/static/js/mandelbrot.js"></script>
    <script type="module" src="/static/js/koch.js"></script>
    <script type="module" src="/static/js/rossler.js"></script>
    <script type="module" src="/static/js/gameOfLife.js"></script>
    <script type="module" src="/static/js/doublePendulum.js"></script>
    <script type="module" src="/static/js/sierpinski.js"></script>
    <script type="module" src="/static/js/lorenz.js"></script>
    <script type="module" src="/static/js/henon.js"></script>
    <script type="module" src="/static/js/logistic.js"></script>
    <script type="module" src="/static/js/ikeda.js"></script>
    <script type="module" src="/static/js/cantor.js"></script>
    <script type="module" src="/static/js/barnsleyFern.js"></script>
    <script type="module" src="/static/js/turing.js"></script>

  <!--     引入主控制脚本，使用模块 -->
    <script type="module" src="static/js/main.js"></script>
</body>
</html>
